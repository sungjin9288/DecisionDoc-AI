# DecisionDoc-AI 문서 스타일 가이드 (헌법)
# AI가 문서를 생성할 때 반드시 따라야 할 스타일·톤·서식 규칙
version: "1.0"
updated: "2026-03"

# ─────────────────────────────────────────────────────────
# 공통 규칙 (모든 번들에 적용)
# ─────────────────────────────────────────────────────────
global:
  tone:
    formality: "전문적이되 딱딱하지 않게 — 독자가 이해하기 쉬운 실무 문서"
    person: "3인칭 주어 또는 팀/조직 기준 서술"
    tense: "현재형 또는 단언형 — '~한다', '~이다' (예외: 미래 계획은 '~예정')"

  sentence_style:
    - "핵심 결론을 먼저, 근거를 나중에 (Bottom-line Up Front)"
    - "한 문장에 하나의 아이디어만"
    - "모호한 수식어 금지 — '다양한', '여러', '일부' 대신 구체적 수치"
    - "수동태 최소화 — '검토되었다' → '검토한다'"

  numbers_and_data:
    - "구체적 수치 반드시 포함 (%, 원, 일수, 건수)"
    - "비교 기준 명시 — '전년 대비 30% 증가', '업계 평균의 2배'"
    - "단위 통일 — 금액은 '원' 또는 '억 원', 비율은 '%'"

  prohibited_expressions:
    - "TBD, TODO, FIXME, 추후 결정"
    - "추진할 예정입니다 → '추진한다'"
    - "검토가 필요합니다 → '검토한다' 또는 구체적 결정"
    - "다양한 방면에서 → 구체적 분야 명시"
    - "여러 이해관계자 → 구체적 주체 명시"

  formatting:
    bullet_style: "동사로 시작하는 행동 중심 (예: '구현한다', '검증한다')"
    emphasis: "**굵게** — 핵심 결정사항, 수치, 고유명사에만 사용"
    max_bullet_depth: 2

# ─────────────────────────────────────────────────────────
# 언어별 규칙
# ─────────────────────────────────────────────────────────
language:
  ko:
    honorifics: "합쇼체 금지 — '합니다체' 사용 (단, 섹션 제목은 명사형)"
    technical_terms: "영문 기술 용어는 첫 등장 시 한글 병기 (예: MSA(마이크로서비스 아키텍처))"
    list_ending: "목록 항목은 명사형 또는 '~한다'로 통일"

  en:
    voice: "Active voice preferred"
    technical_terms: "Use standard industry terminology"
    list_ending: "Use imperative form or noun phrases"

# ─────────────────────────────────────────────────────────
# 번들별 특화 규칙
# ─────────────────────────────────────────────────────────
bundle_overrides:
  tech_decision:
    extra_rules:
      - "options: 최소 3개 대안, 각 대안에 실제 기술 이름 명시 (예: PostgreSQL, Kafka)"
      - "risks: 각 리스크에 구체적 완화 방안 포함"
      - "decision: 선택 이유를 기술적 근거와 함께 단 1~2문장으로"

  proposal_kr:
    extra_rules:
      - "정책 맥락 반드시 언급 (관련 법령, 정부 계획명)"
      - "예산 규모는 '억 원' 단위로 명시"
      - "기대 효과는 정량 지표 포함 (%, 원, 건수)"

  business_plan_kr:
    extra_rules:
      - "시장 규모는 TAM/SAM/SOM 구분하여 작성"
      - "수익 모델은 단가 × 수량 형태로 구체화"
      - "경쟁사 분석 시 실제 기업명 사용"

  edu_plan_kr:
    extra_rules:
      - "학습 목표는 직무 수행 능력 향상 관점에서 구체적으로"
      - "평가는 사전/사후 역량 측정 포함"
      - "현업 적용도 평가 방법 포함"

  meeting_minutes_kr:
    extra_rules:
      - "액션 아이템에 담당자·기한 필수 명시"
      - "의사결정 사항은 결정 배경과 함께 기록"
      - "회의 개요에 일시·장소·참석자·목적 포함"

  project_report_kr:
    extra_rules:
      - "목표 대비 달성률 수치(%) 필수"
      - "교훈은 문제→원인→개선방안 구조로"
      - "경영진 요약은 결론 먼저(BLUF) 원칙"

  contract_kr:
    extra_rules:
      - "계약 당사자·기간·금액 첫 섹션 명시"
      - "각 조항 번호 매기기"
      - "법적 모호성 최소화, 정확한 법률 용어 사용"
      - "AI 초안 면책 문구 포함"

  presentation_kr:
    extra_rules:
      - "슬라이드당 핵심 메시지 1개"
      - "경영진 대상: 비즈니스 임팩트 수치 전면 배치"
      - "데이터 시각화 힌트 포함 (차트 유형 제안)"

  job_description_kr:
    extra_rules:
      - "자격 요건은 필수/우대 명확히 구분"
      - "연봉 범위 또는 협의 여부 명시"
      - "복지 항목은 구체적으로 (예: '자유로운 재택' 대신 '주 2회 재택 가능')"

  okr_plan_kr:
    extra_rules:
      - "Key Results는 반드시 측정 가능한 숫자 포함"
      - "달성 기한 명시 (예: Q2, 6월 말)"
      - "Objective는 도전적이지만 현실 가능한 수준"

  prd_kr:
    extra_rules:
      - "사용자 스토리 형식 — As a [역할], I want [기능], so that [목적]"
      - "우선순위는 MoSCoW 방식 (Must/Should/Could/Won't)"
      - "비기능 요건에 수치 포함 (응답시간 < 200ms 등)"
