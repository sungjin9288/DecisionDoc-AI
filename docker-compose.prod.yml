services:
  app:
    image: ${DOCKER_IMAGE:-ghcr.io/sungjin9288/decisiondoc-ai:latest}
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DECISIONDOC_ENV=${DECISIONDOC_ENV:-prod}
      - DECISIONDOC_STORAGE=${DECISIONDOC_STORAGE:-local}
      - DECISIONDOC_PROVIDER=${DECISIONDOC_PROVIDER:-openai}
      - DECISIONDOC_PROVIDER_GENERATION=${DECISIONDOC_PROVIDER_GENERATION:-}
      - DECISIONDOC_PROVIDER_ATTACHMENT=${DECISIONDOC_PROVIDER_ATTACHMENT:-}
      - DECISIONDOC_PROVIDER_VISUAL=${DECISIONDOC_PROVIDER_VISUAL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DECISIONDOC_GEMINI_MODEL=${DECISIONDOC_GEMINI_MODEL:-}
      - DECISIONDOC_CLAUDE_MODEL=${DECISIONDOC_CLAUDE_MODEL:-}
      - DECISIONDOC_CLAUDE_API_VERSION=${DECISIONDOC_CLAUDE_API_VERSION:-}
      - DECISIONDOC_API_KEYS=${DECISIONDOC_API_KEYS:-}
      - DECISIONDOC_API_KEY=${DECISIONDOC_API_KEY:-}
      - DECISIONDOC_OPS_KEY=${DECISIONDOC_OPS_KEY:-}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - G2B_API_KEY=${G2B_API_KEY:-}
      - DECISIONDOC_TEMPLATE_VERSION=${DECISIONDOC_TEMPLATE_VERSION:-v1}
    volumes:
      - decisiondoc_data:/app/data
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      app:
        condition: service_healthy

volumes:
  decisiondoc_data:
  nginx_cache:
