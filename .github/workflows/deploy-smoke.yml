name: deploy-smoke

run-name: deploy-smoke [${{ inputs.stage }}${{ inputs.deployment_suffix }}] @ ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      stage:
        description: "Deployment stage"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod
      provider:
        description: "Expected provider for smoke payload context"
        required: true
        default: mock
        type: choice
        options:
          - mock
          - openai
          - gemini
      template_version:
        description: "Template version"
        required: true
        default: v1
        type: string
      deployment_suffix:
        description: "Optional fresh-stack suffix (example: -green)"
        required: false
        default: ""
        type: string
      maintenance_mode:
        description: "Maintenance mode (1 blocks /generate*)"
        required: true
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      include_ops_smoke:
        description: "Run ops smoke on non-dev stage"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      include_voice_brief_smoke:
        description: "Run Voice Brief import smoke when integration is configured"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      include_meeting_recording_smoke:
        description: "Run native meeting recording smoke when transcription runtime is configured"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      include_procurement_smoke:
        description: "Run procurement post-deploy smoke when a stage URL or bid number is configured"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      break_glass_reason:
        description: "Optional prod override reason when no successful dev deploy-smoke exists for the same main SHA"
        required: false
        default: ""
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      actions: read
    env:
      CI: "true"
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Resolve deployment naming
        run: |
          DEPLOYMENT_SUFFIX="${{ inputs.deployment_suffix }}"
          if [ -n "${DEPLOYMENT_SUFFIX}" ] && ! printf '%s\n' "${DEPLOYMENT_SUFFIX}" | grep -Eq '^-[a-z0-9-]+$'; then
            echo "deployment_suffix must be empty or match ^-[a-z0-9-]+$"
            exit 1
          fi
          STACK_NAME="decisiondoc-ai-${{ inputs.stage }}${DEPLOYMENT_SUFFIX}"
          FUNCTION_NAME="${STACK_NAME}"
          DEV_STAGE_LABEL="dev${DEPLOYMENT_SUFFIX}"
          REQUIRED_DEV_TITLE_FRAGMENT="[${DEV_STAGE_LABEL}]"
          echo "DEPLOYMENT_SUFFIX=${DEPLOYMENT_SUFFIX}" >> "$GITHUB_ENV"
          echo "STACK_NAME=${STACK_NAME}" >> "$GITHUB_ENV"
          echo "FUNCTION_NAME=${FUNCTION_NAME}" >> "$GITHUB_ENV"
          echo "DEV_STAGE_LABEL=${DEV_STAGE_LABEL}" >> "$GITHUB_ENV"
          echo "REQUIRED_DEV_TITLE_FRAGMENT=${REQUIRED_DEV_TITLE_FRAGMENT}" >> "$GITHUB_ENV"

      - name: Enforce dev-first gate for prod
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          CURRENT_SHA: ${{ github.sha }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          CURRENT_REF_NAME: ${{ github.ref_name }}
          BREAK_GLASS_REASON: ${{ inputs.break_glass_reason }}
        run: |
          if [ "${{ inputs.stage }}" != "prod" ]; then
            echo "Non-prod deploy; skipping dev-first gate."
            exit 0
          fi

          if [ "${CURRENT_REF_NAME}" != "main" ]; then
            echo "Prod deploy-smoke is only allowed from main. Current ref: ${CURRENT_REF_NAME}"
            exit 1
          fi

          python - <<'PY'
          import json
          import os
          import subprocess
          import sys

          repo = os.environ["REPO"]
          current_sha = os.environ["CURRENT_SHA"]
          current_run_id = int(os.environ["CURRENT_RUN_ID"])
          break_glass_reason = os.environ.get("BREAK_GLASS_REASON", "").strip()
          required_dev_title_fragment = os.environ["REQUIRED_DEV_TITLE_FRAGMENT"]

          output = subprocess.check_output(
              [
                  "gh",
                  "api",
                  f"repos/{repo}/actions/workflows/deploy-smoke.yml/runs?branch=main&status=success&per_page=100",
              ],
              text=True,
          )
          payload = json.loads(output)
          runs = payload.get("workflow_runs", [])

          matching_dev_run = None
          for run in runs:
              if run.get("id") == current_run_id:
                  continue
              if run.get("head_sha") != current_sha:
                  continue
              title = run.get("display_title") or ""
              if required_dev_title_fragment not in title:
                  continue
              matching_dev_run = run
              break

          if matching_dev_run:
              print(
                  "Found successful dev deploy-smoke gate:",
                  matching_dev_run.get("html_url", matching_dev_run.get("url")),
              )
              sys.exit(0)

          if break_glass_reason:
              print("No successful dev deploy-smoke found for this main SHA.")
              print("Proceeding with prod break-glass override reason:")
              print(break_glass_reason)
              sys.exit(0)

          print(
              f"Missing successful {required_dev_title_fragment} deploy-smoke for the same main SHA. "
              "Run dev first or provide workflow_dispatch input break_glass_reason."
          )
          sys.exit(1)
          PY

      - uses: aws-actions/setup-sam@v2

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt boto3

      - name: Resolve stage secrets
        run: |
          if [ "${{ inputs.stage }}" = "dev" ]; then
            ROLE_ARN="${{ secrets.AWS_ROLE_ARN_DEV }}"
            BUCKET="${{ secrets.DECISIONDOC_S3_BUCKET_DEV }}"
            THROTTLE_BURST="5"
            THROTTLE_RATE="2"
            RESERVED_CONCURRENCY=""
            OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY_DEV }}"
            OPENAI_API_BASE_URL="${{ vars.OPENAI_API_BASE_URL_DEV }}"
            MEETING_RECORDING_TRANSCRIPTION_MODEL="${{ vars.MEETING_RECORDING_TRANSCRIPTION_MODEL_DEV }}"
            MEETING_RECORDING_MAX_UPLOAD_BYTES="${{ vars.MEETING_RECORDING_MAX_UPLOAD_BYTES_DEV }}"
            MEETING_RECORDING_CONTEXT_CHAR_LIMIT="${{ vars.MEETING_RECORDING_CONTEXT_CHAR_LIMIT_DEV }}"
            G2B_API_KEY="${{ secrets.G2B_API_KEY_DEV }}"
            VOICE_BRIEF_API_BASE_URL="${{ secrets.VOICE_BRIEF_API_BASE_URL_DEV }}"
            VOICE_BRIEF_API_BEARER_TOKEN="${{ secrets.VOICE_BRIEF_API_BEARER_TOKEN_DEV }}"
            VOICE_BRIEF_TIMEOUT_SECONDS="${{ vars.VOICE_BRIEF_TIMEOUT_SECONDS_DEV }}"
            VOICE_BRIEF_SMOKE_RECORDING_ID="${{ vars.VOICE_BRIEF_SMOKE_RECORDING_ID_DEV }}"
            VOICE_BRIEF_SMOKE_REVISION_ID="${{ vars.VOICE_BRIEF_SMOKE_REVISION_ID_DEV }}"
            VOICE_BRIEF_SMOKE_TENANT_ID="${{ vars.VOICE_BRIEF_SMOKE_TENANT_ID_DEV }}"
            VOICE_BRIEF_SMOKE_USERNAME="${{ secrets.VOICE_BRIEF_SMOKE_USERNAME_DEV }}"
            VOICE_BRIEF_SMOKE_PASSWORD="${{ secrets.VOICE_BRIEF_SMOKE_PASSWORD_DEV }}"
            PROCUREMENT_COPILOT_ENABLED="${{ vars.DECISIONDOC_PROCUREMENT_COPILOT_ENABLED_DEV }}"
          else
            ROLE_ARN="${{ secrets.AWS_ROLE_ARN_PROD }}"
            BUCKET="${{ secrets.DECISIONDOC_S3_BUCKET_PROD }}"
            THROTTLE_BURST="20"
            THROTTLE_RATE="10"
            RESERVED_CONCURRENCY=""
            OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY_PROD }}"
            OPENAI_API_BASE_URL="${{ vars.OPENAI_API_BASE_URL_PROD }}"
            MEETING_RECORDING_TRANSCRIPTION_MODEL="${{ vars.MEETING_RECORDING_TRANSCRIPTION_MODEL_PROD }}"
            MEETING_RECORDING_MAX_UPLOAD_BYTES="${{ vars.MEETING_RECORDING_MAX_UPLOAD_BYTES_PROD }}"
            MEETING_RECORDING_CONTEXT_CHAR_LIMIT="${{ vars.MEETING_RECORDING_CONTEXT_CHAR_LIMIT_PROD }}"
            G2B_API_KEY="${{ secrets.G2B_API_KEY_PROD }}"
            VOICE_BRIEF_API_BASE_URL="${{ secrets.VOICE_BRIEF_API_BASE_URL_PROD }}"
            VOICE_BRIEF_API_BEARER_TOKEN="${{ secrets.VOICE_BRIEF_API_BEARER_TOKEN_PROD }}"
            VOICE_BRIEF_TIMEOUT_SECONDS="${{ vars.VOICE_BRIEF_TIMEOUT_SECONDS_PROD }}"
            VOICE_BRIEF_SMOKE_RECORDING_ID="${{ vars.VOICE_BRIEF_SMOKE_RECORDING_ID_PROD }}"
            VOICE_BRIEF_SMOKE_REVISION_ID="${{ vars.VOICE_BRIEF_SMOKE_REVISION_ID_PROD }}"
            VOICE_BRIEF_SMOKE_TENANT_ID="${{ vars.VOICE_BRIEF_SMOKE_TENANT_ID_PROD }}"
            VOICE_BRIEF_SMOKE_USERNAME="${{ secrets.VOICE_BRIEF_SMOKE_USERNAME_PROD }}"
            VOICE_BRIEF_SMOKE_PASSWORD="${{ secrets.VOICE_BRIEF_SMOKE_PASSWORD_PROD }}"
            PROCUREMENT_COPILOT_ENABLED="${{ vars.DECISIONDOC_PROCUREMENT_COPILOT_ENABLED_PROD }}"
          fi
          if [ -z "${OPENAI_API_KEY}" ]; then
            OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"
          fi
          API_KEY="${{ secrets.DECISIONDOC_API_KEY }}"
          API_KEYS="${{ secrets.DECISIONDOC_API_KEYS }}"
          OPS_KEY="${{ secrets.DECISIONDOC_OPS_KEY }}"
          STATUSPAGE_PAGE_ID="${{ secrets.STATUSPAGE_PAGE_ID }}"
          STATUSPAGE_API_KEY="${{ secrets.STATUSPAGE_API_KEY }}"
          if [ -z "${VOICE_BRIEF_TIMEOUT_SECONDS}" ]; then
            VOICE_BRIEF_TIMEOUT_SECONDS="10.0"
          fi
          if [ -z "${PROCUREMENT_COPILOT_ENABLED}" ]; then
            PROCUREMENT_COPILOT_ENABLED="0"
          fi
          if [ -z "${AWS_REGION}" ]; then
            echo "Missing AWS_REGION secret"
            exit 1
          fi
          if [ -z "${ROLE_ARN}" ]; then
            echo "Missing stage role secret"
            exit 1
          fi
          if [ -z "${BUCKET}" ]; then
            echo "Missing stage S3 bucket secret"
            exit 1
          fi
          if [ -z "${API_KEY}" ]; then
            echo "Missing DECISIONDOC_API_KEY secret"
            exit 1
          fi
          if [ -z "${API_KEYS}" ]; then
            API_KEYS="${API_KEY}"
          fi
          if [ -z "${OPS_KEY}" ]; then
            echo "Missing DECISIONDOC_OPS_KEY secret"
            exit 1
          fi
          echo "AWS_ROLE_ARN=${ROLE_ARN}" >> "$GITHUB_ENV"
          echo "DECISIONDOC_S3_BUCKET=${BUCKET}" >> "$GITHUB_ENV"
          echo "DECISIONDOC_API_KEY=${API_KEY}" >> "$GITHUB_ENV"
          echo "DECISIONDOC_API_KEYS=${API_KEYS}" >> "$GITHUB_ENV"
          echo "DECISIONDOC_OPS_KEY=${OPS_KEY}" >> "$GITHUB_ENV"
          echo "OPENAI_API_KEY=${OPENAI_API_KEY}" >> "$GITHUB_ENV"
          echo "OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL}" >> "$GITHUB_ENV"
          echo "MEETING_RECORDING_TRANSCRIPTION_MODEL=${MEETING_RECORDING_TRANSCRIPTION_MODEL}" >> "$GITHUB_ENV"
          echo "MEETING_RECORDING_MAX_UPLOAD_BYTES=${MEETING_RECORDING_MAX_UPLOAD_BYTES}" >> "$GITHUB_ENV"
          echo "MEETING_RECORDING_CONTEXT_CHAR_LIMIT=${MEETING_RECORDING_CONTEXT_CHAR_LIMIT}" >> "$GITHUB_ENV"
          echo "STATUSPAGE_PAGE_ID=${STATUSPAGE_PAGE_ID}" >> "$GITHUB_ENV"
          echo "STATUSPAGE_API_KEY=${STATUSPAGE_API_KEY}" >> "$GITHUB_ENV"
          echo "G2B_API_KEY=${G2B_API_KEY}" >> "$GITHUB_ENV"
          echo "VOICE_BRIEF_API_BASE_URL=${VOICE_BRIEF_API_BASE_URL}" >> "$GITHUB_ENV"
          echo "VOICE_BRIEF_API_BEARER_TOKEN=${VOICE_BRIEF_API_BEARER_TOKEN}" >> "$GITHUB_ENV"
          echo "VOICE_BRIEF_TIMEOUT_SECONDS=${VOICE_BRIEF_TIMEOUT_SECONDS}" >> "$GITHUB_ENV"
          echo "VOICE_BRIEF_SMOKE_RECORDING_ID=${VOICE_BRIEF_SMOKE_RECORDING_ID}" >> "$GITHUB_ENV"
          echo "VOICE_BRIEF_SMOKE_REVISION_ID=${VOICE_BRIEF_SMOKE_REVISION_ID}" >> "$GITHUB_ENV"
          echo "VOICE_BRIEF_SMOKE_TENANT_ID=${VOICE_BRIEF_SMOKE_TENANT_ID}" >> "$GITHUB_ENV"
          echo "VOICE_BRIEF_SMOKE_USERNAME=${VOICE_BRIEF_SMOKE_USERNAME}" >> "$GITHUB_ENV"
          echo "VOICE_BRIEF_SMOKE_PASSWORD=${VOICE_BRIEF_SMOKE_PASSWORD}" >> "$GITHUB_ENV"
          echo "PROCUREMENT_COPILOT_ENABLED=${PROCUREMENT_COPILOT_ENABLED}" >> "$GITHUB_ENV"
          echo "THROTTLE_BURST=${THROTTLE_BURST}" >> "$GITHUB_ENV"
          echo "THROTTLE_RATE=${THROTTLE_RATE}" >> "$GITHUB_ENV"
          echo "RESERVED_CONCURRENCY=${RESERVED_CONCURRENCY}" >> "$GITHUB_ENV"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Preflight stack state and Lambda update mutability
        run: |
          STACK_EXISTS=1
          STACK_STATUS_OUTPUT="$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query 'Stacks[0].StackStatus' \
            --output text 2>&1)" && STACK_STATUS_EXIT=0 || STACK_STATUS_EXIT=$?
          if [ "${STACK_STATUS_EXIT}" -ne 0 ]; then
            if printf '%s\n' "${STACK_STATUS_OUTPUT}" | grep -q 'does not exist'; then
              echo "Stack ${STACK_NAME} does not exist yet; continuing because this may be a first deploy"
              STACK_EXISTS=0
            else
              printf '%s\n' "${STACK_STATUS_OUTPUT}"
              exit "${STACK_STATUS_EXIT}"
            fi
          elif [ "${STACK_STATUS_OUTPUT}" = "UPDATE_ROLLBACK_FAILED" ]; then
            echo "Stack ${STACK_NAME} is UPDATE_ROLLBACK_FAILED. Recover the stack before rerunning deploy-smoke."
            exit 1
          fi

          if [ "${STACK_EXISTS}" -eq 0 ]; then
            echo "Skipping Lambda UpdateFunctionCode dry-run because ${STACK_NAME} is a fresh-stack create path."
            exit 0
          fi

          TMPDIR="$(mktemp -d)"
          printf 'preflight\n' > "${TMPDIR}/bootstrap.txt"
          (
            cd "${TMPDIR}"
            zip -q code.zip bootstrap.txt
          )
          DRY_RUN_OUTPUT="$(aws lambda update-function-code \
            --function-name "${FUNCTION_NAME}" \
            --region "${AWS_REGION}" \
            --zip-file "fileb://${TMPDIR}/code.zip" \
            --dry-run 2>&1)" && DRY_RUN_EXIT=0 || DRY_RUN_EXIT=$?
          rm -rf "${TMPDIR}"

          if [ "${DRY_RUN_EXIT}" -ne 0 ]; then
            printf '%s\n' "${DRY_RUN_OUTPUT}"
            if printf '%s\n' "${DRY_RUN_OUTPUT}" | grep -q 'ResourceNotFoundException'; then
              echo "Function ${FUNCTION_NAME} does not exist yet; continuing because this may be a first deploy."
              exit 0
            fi
            if printf '%s\n' "${DRY_RUN_OUTPUT}" | grep -q 'AccessDeniedException'; then
              echo "Lambda UpdateFunctionCode dry-run is denied for ${FUNCTION_NAME}. Stop reruns and investigate AWS-side Lambda update restrictions before redeploying."
            fi
            exit "${DRY_RUN_EXIT}"
          fi

      - name: Prepare Lambda manifest
        run: |
          cp requirements-lambda.txt requirements.txt

      - name: SAM build
        run: |
          sam build --template-file infra/sam/template.yaml

      - name: SAM deploy
        run: |
          PARAM_OVERRIDES=(
            "Stage=${{ inputs.stage }}"
            "TemplateVersion=${{ inputs.template_version }}"
            "S3BucketName=${DECISIONDOC_S3_BUCKET}"
            "S3Prefix=decisiondoc-ai/"
            "DecisionDocApiKey=${{ secrets.DECISIONDOC_API_KEY }}"
            "DecisionDocApiKeys=${DECISIONDOC_API_KEYS}"
            "DecisionDocOpsKey=${DECISIONDOC_OPS_KEY}"
            "DecisionDocMaintenance=${{ inputs.maintenance_mode }}"
            "DecisionDocProcurementCopilotEnabled=${PROCUREMENT_COPILOT_ENABLED}"
            "MeetingRecordingTranscriptionModel=${MEETING_RECORDING_TRANSCRIPTION_MODEL:-gpt-4o-mini-transcribe}"
            "MeetingRecordingMaxUploadBytes=${MEETING_RECORDING_MAX_UPLOAD_BYTES:-26214400}"
            "MeetingRecordingContextCharLimit=${MEETING_RECORDING_CONTEXT_CHAR_LIMIT:-12000}"
            "ApiThrottlingBurstLimit=${THROTTLE_BURST}"
            "ApiThrottlingRateLimit=${THROTTLE_RATE}"
          )
          if [ -n "${RESERVED_CONCURRENCY}" ]; then
            PARAM_OVERRIDES+=("LambdaReservedConcurrentExecutions=${RESERVED_CONCURRENCY}")
          fi
          if [ -n "${STATUSPAGE_PAGE_ID}" ]; then
            PARAM_OVERRIDES+=("StatuspagePageId=${STATUSPAGE_PAGE_ID}")
          fi
          if [ -n "${STATUSPAGE_API_KEY}" ]; then
            PARAM_OVERRIDES+=("StatuspageApiKey=${STATUSPAGE_API_KEY}")
          fi
          if [ -n "${G2B_API_KEY}" ]; then
            PARAM_OVERRIDES+=("G2bApiKey=${G2B_API_KEY}")
          fi
          if [ -n "${OPENAI_API_KEY}" ]; then
            PARAM_OVERRIDES+=("OpenAIApiKey=${OPENAI_API_KEY}")
          fi
          if [ -n "${OPENAI_API_BASE_URL}" ]; then
            PARAM_OVERRIDES+=("OpenAiApiBaseUrl=${OPENAI_API_BASE_URL}")
          fi
          if [ -n "${DEPLOYMENT_SUFFIX}" ]; then
            PARAM_OVERRIDES+=("DeploymentSuffix=${DEPLOYMENT_SUFFIX}")
          fi
          if [ -n "${VOICE_BRIEF_API_BASE_URL}" ]; then
            PARAM_OVERRIDES+=("VoiceBriefApiBaseUrl=${VOICE_BRIEF_API_BASE_URL}")
          fi
          if [ -n "${VOICE_BRIEF_API_BEARER_TOKEN}" ]; then
            PARAM_OVERRIDES+=("VoiceBriefApiBearerToken=${VOICE_BRIEF_API_BEARER_TOKEN}")
          fi
          if [ -n "${VOICE_BRIEF_TIMEOUT_SECONDS}" ]; then
            PARAM_OVERRIDES+=("VoiceBriefTimeoutSeconds=${VOICE_BRIEF_TIMEOUT_SECONDS}")
          fi
          sam deploy \
            --template-file .aws-sam/build/template.yaml \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --s3-bucket "${DECISIONDOC_S3_BUCKET}" \
            --s3-prefix "sam-artifacts/${{ inputs.stage }}/" \
            --parameter-overrides "${PARAM_OVERRIDES[@]}"

      - name: Resolve API endpoint
        id: stack_outputs
        run: |
          BASE_URL="$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query 'Stacks[0].Outputs[?OutputKey==`HttpApiUrl`].OutputValue' \
            --output text)"
          if [ -z "${BASE_URL}" ] || [ "${BASE_URL}" = "None" ]; then
            echo "Missing HttpApiUrl stack output"
            exit 1
          fi
          echo "smoke_base_url=${BASE_URL}" >> "$GITHUB_OUTPUT"

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Resolve deployment naming
        run: |
          DEPLOYMENT_SUFFIX="${{ inputs.deployment_suffix }}"
          if [ -n "${DEPLOYMENT_SUFFIX}" ] && ! printf '%s\n' "${DEPLOYMENT_SUFFIX}" | grep -Eq '^-[a-z0-9-]+$'; then
            echo "deployment_suffix must be empty or match ^-[a-z0-9-]+$"
            exit 1
          fi
          STACK_NAME="decisiondoc-ai-${{ inputs.stage }}${DEPLOYMENT_SUFFIX}"
          echo "STACK_NAME=${STACK_NAME}" >> "$GITHUB_ENV"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt boto3

      - name: Resolve smoke stage settings
        run: |
          if [ "${{ inputs.stage }}" = "dev" ]; then
            ROLE_ARN="${{ secrets.AWS_ROLE_ARN_DEV }}"
            G2B_API_KEY="${{ secrets.G2B_API_KEY_DEV }}"
            PROCUREMENT_SMOKE_URL_OR_NUMBER="${{ vars.PROCUREMENT_SMOKE_URL_OR_NUMBER_DEV }}"
            PROCUREMENT_SMOKE_TENANT_ID="${{ vars.PROCUREMENT_SMOKE_TENANT_ID_DEV }}"
            PROCUREMENT_SMOKE_USERNAME="${{ secrets.PROCUREMENT_SMOKE_USERNAME_DEV }}"
            PROCUREMENT_SMOKE_PASSWORD="${{ secrets.PROCUREMENT_SMOKE_PASSWORD_DEV }}"
            VOICE_BRIEF_API_BASE_URL="${{ secrets.VOICE_BRIEF_API_BASE_URL_DEV }}"
            VOICE_BRIEF_SMOKE_RECORDING_ID="${{ vars.VOICE_BRIEF_SMOKE_RECORDING_ID_DEV }}"
            VOICE_BRIEF_SMOKE_REVISION_ID="${{ vars.VOICE_BRIEF_SMOKE_REVISION_ID_DEV }}"
            VOICE_BRIEF_SMOKE_TENANT_ID="${{ vars.VOICE_BRIEF_SMOKE_TENANT_ID_DEV }}"
            VOICE_BRIEF_SMOKE_USERNAME="${{ secrets.VOICE_BRIEF_SMOKE_USERNAME_DEV }}"
            VOICE_BRIEF_SMOKE_PASSWORD="${{ secrets.VOICE_BRIEF_SMOKE_PASSWORD_DEV }}"
          else
            ROLE_ARN="${{ secrets.AWS_ROLE_ARN_PROD }}"
            G2B_API_KEY="${{ secrets.G2B_API_KEY_PROD }}"
            PROCUREMENT_SMOKE_URL_OR_NUMBER="${{ vars.PROCUREMENT_SMOKE_URL_OR_NUMBER_PROD }}"
            PROCUREMENT_SMOKE_TENANT_ID="${{ vars.PROCUREMENT_SMOKE_TENANT_ID_PROD }}"
            PROCUREMENT_SMOKE_USERNAME="${{ secrets.PROCUREMENT_SMOKE_USERNAME_PROD }}"
            PROCUREMENT_SMOKE_PASSWORD="${{ secrets.PROCUREMENT_SMOKE_PASSWORD_PROD }}"
            VOICE_BRIEF_API_BASE_URL="${{ secrets.VOICE_BRIEF_API_BASE_URL_PROD }}"
            VOICE_BRIEF_SMOKE_RECORDING_ID="${{ vars.VOICE_BRIEF_SMOKE_RECORDING_ID_PROD }}"
            VOICE_BRIEF_SMOKE_REVISION_ID="${{ vars.VOICE_BRIEF_SMOKE_REVISION_ID_PROD }}"
            VOICE_BRIEF_SMOKE_TENANT_ID="${{ vars.VOICE_BRIEF_SMOKE_TENANT_ID_PROD }}"
            VOICE_BRIEF_SMOKE_USERNAME="${{ secrets.VOICE_BRIEF_SMOKE_USERNAME_PROD }}"
            VOICE_BRIEF_SMOKE_PASSWORD="${{ secrets.VOICE_BRIEF_SMOKE_PASSWORD_PROD }}"
          fi
          if [ -z "${ROLE_ARN}" ]; then
            echo "Missing stage role secret"
            exit 1
          fi
          echo "AWS_ROLE_ARN=${ROLE_ARN}" >> "$GITHUB_ENV"
          echo "G2B_API_KEY=${G2B_API_KEY}" >> "$GITHUB_ENV"
          echo "PROCUREMENT_SMOKE_URL_OR_NUMBER=${PROCUREMENT_SMOKE_URL_OR_NUMBER}" >> "$GITHUB_ENV"
          echo "PROCUREMENT_SMOKE_TENANT_ID=${PROCUREMENT_SMOKE_TENANT_ID}" >> "$GITHUB_ENV"
          echo "PROCUREMENT_SMOKE_USERNAME=${PROCUREMENT_SMOKE_USERNAME}" >> "$GITHUB_ENV"
          echo "PROCUREMENT_SMOKE_PASSWORD=${PROCUREMENT_SMOKE_PASSWORD}" >> "$GITHUB_ENV"
          echo "VOICE_BRIEF_API_BASE_URL=${VOICE_BRIEF_API_BASE_URL}" >> "$GITHUB_ENV"
          echo "VOICE_BRIEF_SMOKE_RECORDING_ID=${VOICE_BRIEF_SMOKE_RECORDING_ID}" >> "$GITHUB_ENV"
          echo "VOICE_BRIEF_SMOKE_REVISION_ID=${VOICE_BRIEF_SMOKE_REVISION_ID}" >> "$GITHUB_ENV"
          echo "VOICE_BRIEF_SMOKE_TENANT_ID=${VOICE_BRIEF_SMOKE_TENANT_ID}" >> "$GITHUB_ENV"
          echo "VOICE_BRIEF_SMOKE_USERNAME=${VOICE_BRIEF_SMOKE_USERNAME}" >> "$GITHUB_ENV"
          echo "VOICE_BRIEF_SMOKE_PASSWORD=${VOICE_BRIEF_SMOKE_PASSWORD}" >> "$GITHUB_ENV"

      - name: Configure AWS credentials for smoke (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve smoke base URL from stack output
        run: |
          SMOKE_BASE_URL="$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query 'Stacks[0].Outputs[?OutputKey==`HttpApiUrl`].OutputValue' \
            --output text)"
          if [ -z "${SMOKE_BASE_URL}" ] || [ "${SMOKE_BASE_URL}" = "None" ]; then
            echo "Missing HttpApiUrl stack output"
            exit 1
          fi
          echo "SMOKE_BASE_URL=${SMOKE_BASE_URL}" >> "$GITHUB_ENV"

      - name: Validate smoke inputs
        env:
          SMOKE_BASE_URL: ${{ env.SMOKE_BASE_URL }}
          SMOKE_API_KEY: ${{ secrets.DECISIONDOC_API_KEY }}
        run: |
          if [ -z "${SMOKE_BASE_URL}" ]; then
            echo "Missing smoke base URL output"
            exit 1
          fi
          if [ -z "${SMOKE_API_KEY}" ]; then
            echo "Missing DECISIONDOC_API_KEY secret"
            exit 1
          fi
          if [ -z "${AWS_REGION}" ]; then
            echo "Missing AWS_REGION secret"
            exit 1
          fi

      - name: Validate procurement smoke inputs
        if: ${{ inputs.include_procurement_smoke == 'true' }}
        env:
          SMOKE_BASE_URL: ${{ env.SMOKE_BASE_URL }}
          SMOKE_API_KEY: ${{ secrets.DECISIONDOC_API_KEY }}
          G2B_API_KEY: ${{ env.G2B_API_KEY }}
          PROCUREMENT_SMOKE_URL_OR_NUMBER: ${{ env.PROCUREMENT_SMOKE_URL_OR_NUMBER }}
        run: |
          if [ -z "${SMOKE_BASE_URL}" ]; then
            echo "Missing smoke base URL output"
            exit 1
          fi
          if [ -z "${SMOKE_API_KEY}" ]; then
            echo "Missing DECISIONDOC_API_KEY secret"
            exit 1
          fi
          if [ -z "${G2B_API_KEY}" ]; then
            echo "Missing G2B_API_KEY_<STAGE> secret"
            exit 1
          fi
          if [ -z "${PROCUREMENT_SMOKE_URL_OR_NUMBER}" ]; then
            echo "No PROCUREMENT_SMOKE_URL_OR_NUMBER_<STAGE> variable configured; smoke will auto-discover a recent live G2B opportunity"
          fi

      - name: Run smoke
        env:
          SMOKE_BASE_URL: ${{ env.SMOKE_BASE_URL }}
          SMOKE_API_KEY: ${{ secrets.DECISIONDOC_API_KEY }}
          SMOKE_OPS_KEY: ${{ secrets.DECISIONDOC_OPS_KEY }}
          G2B_API_KEY: ${{ env.G2B_API_KEY }}
          SMOKE_PROVIDER: ${{ inputs.provider }}
          SMOKE_INCLUDE_PROCUREMENT: ${{ inputs.include_procurement_smoke == 'true' && '1' || '0' }}
          SMOKE_PROCUREMENT_URL_OR_NUMBER: ${{ env.PROCUREMENT_SMOKE_URL_OR_NUMBER }}
          SMOKE_TENANT_ID: ${{ env.PROCUREMENT_SMOKE_TENANT_ID }}
          PROCUREMENT_SMOKE_USERNAME: ${{ env.PROCUREMENT_SMOKE_USERNAME }}
          PROCUREMENT_SMOKE_PASSWORD: ${{ env.PROCUREMENT_SMOKE_PASSWORD }}
        run: |
          python scripts/smoke.py

      - name: Validate Voice Brief smoke inputs
        if: ${{ inputs.include_voice_brief_smoke == 'true' }}
        env:
          SMOKE_BASE_URL: ${{ env.SMOKE_BASE_URL }}
          SMOKE_API_KEY: ${{ secrets.DECISIONDOC_API_KEY }}
          VOICE_BRIEF_API_BASE_URL: ${{ env.VOICE_BRIEF_API_BASE_URL }}
          VOICE_BRIEF_SMOKE_RECORDING_ID: ${{ env.VOICE_BRIEF_SMOKE_RECORDING_ID }}
        run: |
          if [ -z "${SMOKE_BASE_URL}" ]; then
            echo "Missing smoke base URL output"
            exit 1
          fi
          if [ -z "${SMOKE_API_KEY}" ]; then
            echo "Missing DECISIONDOC_API_KEY secret"
            exit 1
          fi
          if [ -z "${VOICE_BRIEF_API_BASE_URL}" ]; then
            echo "Voice Brief integration is not configured for this stage"
            exit 1
          fi
          if [ -z "${VOICE_BRIEF_SMOKE_RECORDING_ID}" ]; then
            echo "Missing Voice Brief smoke recording id variable"
            exit 1
          fi

      - name: Validate meeting recording smoke inputs
        if: ${{ inputs.include_meeting_recording_smoke == 'true' }}
        env:
          SMOKE_BASE_URL: ${{ env.SMOKE_BASE_URL }}
          SMOKE_API_KEY: ${{ secrets.DECISIONDOC_API_KEY }}
        run: |
          if [ -z "${SMOKE_BASE_URL}" ]; then
            echo "Missing smoke base URL output"
            exit 1
          fi
          if [ -z "${SMOKE_API_KEY}" ]; then
            echo "Missing DECISIONDOC_API_KEY secret"
            exit 1
          fi

      - name: Run meeting recording smoke
        if: ${{ inputs.include_meeting_recording_smoke == 'true' }}
        env:
          SMOKE_BASE_URL: ${{ env.SMOKE_BASE_URL }}
          SMOKE_API_KEY: ${{ secrets.DECISIONDOC_API_KEY }}
        run: |
          python scripts/meeting_recording_smoke.py

      - name: Run Voice Brief smoke
        if: ${{ inputs.include_voice_brief_smoke == 'true' }}
        env:
          SMOKE_BASE_URL: ${{ env.SMOKE_BASE_URL }}
          SMOKE_API_KEY: ${{ secrets.DECISIONDOC_API_KEY }}
          SMOKE_TENANT_ID: ${{ env.VOICE_BRIEF_SMOKE_TENANT_ID }}
          VOICE_BRIEF_SMOKE_RECORDING_ID: ${{ env.VOICE_BRIEF_SMOKE_RECORDING_ID }}
          VOICE_BRIEF_SMOKE_REVISION_ID: ${{ env.VOICE_BRIEF_SMOKE_REVISION_ID }}
          VOICE_BRIEF_SMOKE_USERNAME: ${{ env.VOICE_BRIEF_SMOKE_USERNAME }}
          VOICE_BRIEF_SMOKE_PASSWORD: ${{ env.VOICE_BRIEF_SMOKE_PASSWORD }}
        run: |
          python scripts/voice_brief_smoke.py

      - name: Resolve ops smoke S3 bucket from stack parameters
        if: ${{ inputs.stage == 'dev' || inputs.include_ops_smoke == 'true' }}
        run: |
          SMOKE_S3_BUCKET="$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query 'Stacks[0].Parameters[?ParameterKey==`S3BucketName`].ParameterValue' \
            --output text)"
          SMOKE_S3_PREFIX="$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query 'Stacks[0].Parameters[?ParameterKey==`S3Prefix`].ParameterValue' \
            --output text)"
          if [ -z "${SMOKE_S3_BUCKET}" ] || [ "${SMOKE_S3_BUCKET}" = "None" ]; then
            echo "Missing S3BucketName stack parameter"
            exit 1
          fi
          echo "SMOKE_S3_BUCKET=${SMOKE_S3_BUCKET}" >> "$GITHUB_ENV"
          if [ -n "${SMOKE_S3_PREFIX}" ] && [ "${SMOKE_S3_PREFIX}" != "None" ]; then
            echo "SMOKE_S3_PREFIX=${SMOKE_S3_PREFIX}" >> "$GITHUB_ENV"
          fi

      - name: Validate ops smoke inputs
        if: ${{ inputs.stage == 'dev' || inputs.include_ops_smoke == 'true' }}
        env:
          SMOKE_BASE_URL: ${{ env.SMOKE_BASE_URL }}
          SMOKE_OPS_KEY: ${{ secrets.DECISIONDOC_OPS_KEY }}
        run: |
          if [ -z "${SMOKE_BASE_URL}" ]; then
            echo "Missing smoke base URL output"
            exit 1
          fi
          if [ -z "${SMOKE_OPS_KEY}" ]; then
            echo "Missing DECISIONDOC_OPS_KEY secret"
            exit 1
          fi
          if [ -z "${SMOKE_S3_BUCKET}" ]; then
            echo "Missing ops smoke S3 bucket"
            exit 1
          fi
          if [ -z "${AWS_REGION}" ]; then
            echo "Missing AWS_REGION secret"
            exit 1
          fi

      - name: Run ops smoke
        if: ${{ inputs.stage == 'dev' || inputs.include_ops_smoke == 'true' }}
        env:
          SMOKE_BASE_URL: ${{ env.SMOKE_BASE_URL }}
          SMOKE_OPS_KEY: ${{ secrets.DECISIONDOC_OPS_KEY }}
          SMOKE_S3_BUCKET: ${{ env.SMOKE_S3_BUCKET }}
          SMOKE_S3_PREFIX: ${{ env.SMOKE_S3_PREFIX }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          python scripts/ops_smoke.py
