name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run full test suite
        env:
          ENVIRONMENT: test
          JWT_SECRET_KEY: test-secret-key-32-chars-minimum!!
          DECISIONDOC_PROVIDER: mock
          DECISIONDOC_STORAGE: local
          DECISIONDOC_TEMPLATE_VERSION: v1
          DECISIONDOC_ENV: dev
        run: |
          pytest tests/ -q --tb=short

  security-scan:
    name: Security Scan (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install security tools
        run: pip install bandit safety

      - name: Run Bandit (SAST)
        run: |
          bandit -r app/ \
            -x app/providers/mock_provider.py \
            -ll \
            --format json \
            -o bandit-report.json
          bandit -r app/ -x app/providers/mock_provider.py -ll

      - name: Run Safety legacy check (scan requires auth)
        run: HOME=/tmp safety check -r requirements.txt

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: bandit-report.json

  lint:
    name: Lint (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linters
        run: pip install ruff

      - name: Run Ruff
        run: ruff check app/ --select=E,F,W --ignore=E501
