name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main

jobs:
  secret-hygiene:
    name: Secret Hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install targeted test dependency
        run: pip install pytest

      - name: Scan tracked files for static AWS credentials
        run: python scripts/check_secret_hygiene.py

      - name: Run secret hygiene regression tests
        run: pytest --noconftest tests/test_check_secret_hygiene.py -q --tb=short

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        env:
          NODE_OPTIONS: --no-deprecation
        run: playwright install chromium --with-deps

      - name: Run full test suite
        env:
          ENVIRONMENT: test
          JWT_SECRET_KEY: test-secret-key-32-chars-minimum!!
          DECISIONDOC_PROVIDER: mock
          DECISIONDOC_STORAGE: local
          DECISIONDOC_TEMPLATE_VERSION: v1
          DECISIONDOC_ENV: dev
        run: |
          pytest tests/ -q --tb=short

  security-scan:
    name: Security Scan (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install security tools
        run: pip install bandit safety

      - name: Run Bandit (SAST)
        run: |
          bandit -r app/ \
            -x app/providers/mock_provider.py \
            -ll \
            --format json \
            -o bandit-report.json
          bandit -r app/ -x app/providers/mock_provider.py -ll

      - name: Run Safety scan (advisory, optional auth)
        env:
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
        run: |
          if [ -z "${SAFETY_API_KEY:-}" ]; then
            echo "SAFETY_API_KEY is not configured; skipping Safety scan to avoid interactive auth."
            exit 0
          fi

          set +e
          HOME=/tmp safety \
            --key "$SAFETY_API_KEY" \
            --stage cicd \
            --disable-optional-telemetry \
            scan \
            --target . \
            --save-as json safety-report.json
          scan_status=$?
          if [ "$scan_status" -ne 0 ]; then
            echo "Safety scan exited with status $scan_status."
            echo "Keeping this advisory security step non-blocking."
          fi
          exit 0

      - name: Upload security reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
          if-no-files-found: ignore

  lint:
    name: Lint (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linters
        run: pip install ruff

      - name: Run Ruff
        run: ruff check app/ --select=E,F,W --ignore=E501
