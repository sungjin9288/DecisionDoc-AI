name: CD

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  deploy-staging:
    name: Deploy to Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Check staging deploy configuration
        id: staging_config
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          if [ -n "$STAGING_HOST" ] && [ -n "$STAGING_USER" ] && [ -n "$STAGING_SSH_KEY" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "Staging deploy secrets are configured."
          elif [ -z "$STAGING_HOST" ] && [ -z "$STAGING_USER" ] && [ -z "$STAGING_SSH_KEY" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Staging deploy secrets are not configured; skipping staging deploy and smoke test."
          else
            echo "::error::Staging deploy secrets are partially configured. Set STAGING_HOST, STAGING_USER, and STAGING_SSH_KEY together."
            exit 1
          fi

      - name: Deploy to staging server
        if: steps.staging_config.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/decisiondoc
            git fetch --prune origin
            git -c advice.detachedHead=false checkout --force ${{ github.sha }}
            export DOCKER_IMAGE=ghcr.io/${{ github.repository }}:main
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            echo "Deployed: $DOCKER_IMAGE"

      - name: Smoke test
        if: steps.staging_config.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            sleep 15
            curl -f http://localhost:8000/health || exit 1
            echo "Smoke test passed"

  deploy-production:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Validate production deploy secrets
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          test -n "$PROD_HOST" || { echo "::error::Missing production secret: PROD_HOST"; exit 1; }
          test -n "$PROD_USER" || { echo "::error::Missing production secret: PROD_USER"; exit 1; }
          test -n "$PROD_SSH_KEY" || { echo "::error::Missing production secret: PROD_SSH_KEY"; exit 1; }

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/decisiondoc
            git fetch --prune origin
            git -c advice.detachedHead=false checkout --force ${{ github.sha }}
            export DOCKER_IMAGE=ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            # Backup data
            tar czf /backup/data-$(date +%Y%m%d-%H%M%S).tar.gz /opt/decisiondoc/data/ || true
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            # Wait for health
            for i in {1..12}; do
              if curl -sf http://localhost:8000/health; then
                echo "Production deploy successful"
                exit 0
              fi
              echo "Waiting... ($i/12)"
              sleep 10
            done
            echo "Deploy health check timeout"
            exit 1
