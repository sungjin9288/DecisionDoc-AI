name: CD

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  deploy-staging:
    name: Deploy to Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - name: Check staging deploy configuration
        id: staging_config
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          if [ -n "$STAGING_HOST" ] && [ -n "$STAGING_USER" ] && [ -n "$STAGING_SSH_KEY" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "Staging deploy secrets are configured."
          elif [ -z "$STAGING_HOST" ] && [ -z "$STAGING_USER" ] && [ -z "$STAGING_SSH_KEY" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Staging deploy secrets are not configured; skipping staging deploy and smoke test."
          else
            echo "::error::Staging deploy secrets are partially configured. Set STAGING_HOST, STAGING_USER, and STAGING_SSH_KEY together."
            exit 1
          fi

      - name: Deploy to staging server
        if: steps.staging_config.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -eu
            cd /opt/decisiondoc
            git fetch --prune origin
            git -c advice.detachedHead=false checkout --force ${{ github.sha }}
            IMAGE_REPO="$(printf '%s' 'ghcr.io/${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
            export DOCKER_IMAGE="${IMAGE_REPO}:main"
            docker compose --env-file .env.prod -f docker-compose.prod.yml pull
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --remove-orphans
            echo "Deployed: $DOCKER_IMAGE"

      - name: Smoke test
        if: steps.staging_config.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            sleep 15
            curl -f http://localhost:8000/health || exit 1
            echo "Smoke test passed"

  deploy-production:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v6

      - name: Validate production deploy secrets
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          test -n "$PROD_HOST" || { echo "::error::Missing production secret: PROD_HOST"; exit 1; }
          test -n "$PROD_USER" || { echo "::error::Missing production secret: PROD_USER"; exit 1; }
          test -n "$PROD_SSH_KEY" || { echo "::error::Missing production secret: PROD_SSH_KEY"; exit 1; }

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -eu
            cd /opt/decisiondoc
            git fetch --prune origin
            git -c advice.detachedHead=false checkout --force ${{ github.sha }}
            IMAGE_REPO="$(printf '%s' 'ghcr.io/${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
            IMAGE_TAG="${{ github.ref_name }}"
            IMAGE_TAG="${IMAGE_TAG#v}"
            export DOCKER_IMAGE="${IMAGE_REPO}:${IMAGE_TAG}"
            # Backup data
            BACKUP_DIR="${DECISIONDOC_BACKUP_DIR:-./backups}"
            if mkdir -p "$BACKUP_DIR"; then
              tar czf "$BACKUP_DIR/data-$(date +%Y%m%d-%H%M%S).tar.gz" /opt/decisiondoc/data/ || true
            else
              echo "Backup directory unavailable; continuing without data backup"
            fi
            echo "Docker disk usage before cleanup:"
            docker system df || true
            docker image prune -af || true
            docker builder prune -af || true
            echo "Docker disk usage after cleanup:"
            docker system df || true
            docker compose --env-file .env.prod -f docker-compose.prod.yml pull
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --remove-orphans
            # Wait for health
            for i in {1..12}; do
              if curl -sf http://localhost:8000/health; then
                echo "Production local health check passed"
                break
              fi
              echo "Waiting... ($i/12)"
              sleep 10
              if [ "$i" = "12" ]; then
                echo "Deploy health check timeout"
                exit 1
              fi
            done
            export SMOKE_TIMEOUT_SEC="${SMOKE_TIMEOUT_SEC:-180}"
            python3 scripts/post_deploy_check.py \
              --env-file .env.prod \
              --compose-file docker-compose.prod.yml \
              --base-url https://admin.decisiondoc.kr \
              --report-dir ./reports/post-deploy
            echo "Production deploy successful"
