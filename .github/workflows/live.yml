name: live

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "LLM provider"
        type: choice
        required: true
        default: openai
        options:
          - openai
          - gemini
          - claude
          - openai,gemini

env:
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main

jobs:
  live:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      DECISIONDOC_PROVIDER: ${{ inputs.provider }}
      DECISIONDOC_TEMPLATE_VERSION: "v1"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Fail fast if key missing
        run: |
          if [ "${{ inputs.provider }}" = "openai" ] && [ -z "${OPENAI_API_KEY}" ]; then
            echo "Missing OPENAI_API_KEY secret"
            exit 1
          fi
          if [ "${{ inputs.provider }}" = "gemini" ] && [ -z "${GEMINI_API_KEY}" ]; then
            echo "Missing GEMINI_API_KEY secret"
            exit 1
          fi
          if [ "${{ inputs.provider }}" = "claude" ] && [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "Missing ANTHROPIC_API_KEY secret"
            exit 1
          fi
          if [ "${{ inputs.provider }}" = "openai,gemini" ] && [ -z "${GEMINI_API_KEY}" ]; then
            echo "Missing GEMINI_API_KEY secret"
            exit 1
          fi
      - name: Run live tests
        run: |
          if [ "${{ inputs.provider }}" = "openai,gemini" ]; then
            DECISIONDOC_LIVE_FALLBACK_FORCE_OPENAI_FAILURE=1 \
            python -m pytest \
              tests/test_live_providers.py::test_live_openai_gemini_fallback_chain_ok \
              -m live \
              -q \
              -rs
          else
            python -m pytest tests/test_live_providers.py -m live -q -rs
          fi
