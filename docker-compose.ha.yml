version: '3.9'
# High Availability configuration
# - 3 app replicas behind nginx load balancer
# - Shared data volume
# - Health-checked rolling updates

services:
  app:
    image: ${DOCKER_IMAGE:-ghcr.io/sungjin9288/decisiondoc-ai:latest}
    restart: unless-stopped
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
        monitor: 60s
        max_failure_ratio: 0.3
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits: { memory: 2G, cpus: '2.0' }
        reservations: { memory: 512M, cpus: '0.5' }
    environment:
      - ENVIRONMENT=production
      - DECISIONDOC_STORAGE=${DECISIONDOC_STORAGE:-local}
      - DECISIONDOC_PROVIDER=${DECISIONDOC_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - G2B_API_KEY=${G2B_API_KEY:-}
    volumes:
      - decisiondoc_data:/app/data  # shared across replicas
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options: { max-size: "50m", max-file: "5" }

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    volumes:
      - ./nginx/nginx.ssl.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s

  # Watchtower: auto-pull and restart on new image
  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_NOTIFICATIONS=slack
      - WATCHTOWER_NOTIFICATION_SLACK_HOOK_URL=${SLACK_WEBHOOK_URL:-}
    profiles: ["autoupdate"]

volumes:
  decisiondoc_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/decisiondoc/data
  nginx_logs:
