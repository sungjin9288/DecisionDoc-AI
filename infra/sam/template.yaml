AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: DecisionDoc AI Lambda + HTTP API

Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
  DeploymentSuffix:
    Type: String
    Default: ""
    AllowedPattern: "^$|^-[a-z0-9-]+$"
  TemplateVersion:
    Type: String
    Default: v1
  S3BucketName:
    Type: String
  S3Prefix:
    Type: String
    Default: decisiondoc-ai/
  DecisionDocApiKey:
    Type: String
    NoEcho: true
  DecisionDocOpsKey:
    Type: String
    NoEcho: true
  DecisionDocMaintenance:
    Type: String
    Default: "0"
    AllowedValues:
      - "0"
      - "1"
  DecisionDocProcurementCopilotEnabled:
    Type: String
    Default: "0"
    AllowedValues:
      - "0"
      - "1"
  StatuspagePageId:
    Type: String
    Default: ""
  StatuspageApiKey:
    Type: String
    NoEcho: true
    Default: ""
  VoiceBriefApiBaseUrl:
    Type: String
    Default: ""
  VoiceBriefApiBearerToken:
    Type: String
    NoEcho: true
    Default: ""
  VoiceBriefTimeoutSeconds:
    Type: String
    Default: "10.0"
  G2bApiKey:
    Type: String
    NoEcho: true
    Default: ""
  ApiThrottlingBurstLimit:
    Type: Number
    Default: 5
  ApiThrottlingRateLimit:
    Type: Number
    Default: 2
  LambdaReservedConcurrentExecutions:
    Type: String
    Default: ""
    AllowedPattern: "^$|^[1-9][0-9]*$"

Conditions:
  HasReservedConcurrency: !Not [!Equals [!Ref LambdaReservedConcurrentExecutions, ""]]

Resources:
  DecisionDocApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      DefaultRouteSettings:
        ThrottlingBurstLimit: !Ref ApiThrottlingBurstLimit
        ThrottlingRateLimit: !Ref ApiThrottlingRateLimit

  DecisionDocFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub decisiondoc-ai-${Stage}${DeploymentSuffix}
      CodeUri: ../../
      Handler: app.aws_lambda.handler
      Runtime: python3.11
      Timeout: 30
      MemorySize: 512
      ReservedConcurrentExecutions: !If
        - HasReservedConcurrency
        - !Ref LambdaReservedConcurrentExecutions
        - !Ref AWS::NoValue
      Policies:
        - AWSLambdaBasicExecutionRole
        - S3CrudPolicy:
            BucketName: !Ref S3BucketName
      Environment:
        Variables:
          DECISIONDOC_STORAGE: s3
          DECISIONDOC_S3_BUCKET: !Ref S3BucketName
          DECISIONDOC_S3_PREFIX: !Ref S3Prefix
          DECISIONDOC_TEMPLATE_VERSION: !Ref TemplateVersion
          DECISIONDOC_PROVIDER: mock
          DECISIONDOC_ENV: !Ref Stage
          DECISIONDOC_API_KEY: !Ref DecisionDocApiKey
          DECISIONDOC_OPS_KEY: !Ref DecisionDocOpsKey
          DECISIONDOC_MAINTENANCE: !Ref DecisionDocMaintenance
          DECISIONDOC_PROCUREMENT_COPILOT_ENABLED: !Ref DecisionDocProcurementCopilotEnabled
          DECISIONDOC_LAMBDA_FUNCTION_NAME: !Sub decisiondoc-ai-${Stage}${DeploymentSuffix}
          STATUSPAGE_PAGE_ID: !Ref StatuspagePageId
          STATUSPAGE_API_KEY: !Ref StatuspageApiKey
          G2B_API_KEY: !Ref G2bApiKey
          VOICE_BRIEF_API_BASE_URL: !Ref VoiceBriefApiBaseUrl
          VOICE_BRIEF_API_BEARER_TOKEN: !Ref VoiceBriefApiBearerToken
          VOICE_BRIEF_TIMEOUT_SECONDS: !Ref VoiceBriefTimeoutSeconds
      Events:
        Root:
          Type: HttpApi
          Properties:
            ApiId: !Ref DecisionDocApi
            Path: /
            Method: ANY
        Proxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref DecisionDocApi
            Path: /{proxy+}
            Method: ANY

Outputs:
  HttpApiUrl:
    Description: HTTP API endpoint
    Value: !Sub https://${DecisionDocApi}.execute-api.${AWS::Region}.amazonaws.com
